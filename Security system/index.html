<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

.header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    
}

.logo{
    width: 380px;
    height: 380px;
    object-fit: contain;
}
.h1{
    position: relative;
    top: 40px;
}

h1,h2{
    text-align:center;
}

label{
    display:block;
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}

small{
    display:block;
    color:gray;
    margin-top:5px;
    margin-bottom:8px;
}

input{
    display:block;
    width:400px;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#007bff;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

</style>
</head>

<body>

<div class="container">
    <div class="header">  
         <h1 class="h1">Security System</h1>

        <img src="WhatsApp_Image_2026-06-23_at_11.17.44_AM-removebg-preview.png" class="logo">
    </div>        

    <label>Customer Name</label>
    <small>Enter visitor full name</small>
    <input type="text" id="name">
    <label>National ID</label>
    <small>Used for identification and searching</small>
    <input type="text" id="nationalId">
    <label>Sector</label>
    <small>Department or sector</small>
    <input type="text" id="sector">
    <label>Entry Date</label>
    <small>Date when visitor entered</small>
    <input type="date" id="entryDate">
    <label>Entry Time</label>
    <small>Time when visitor entered</small>
    <input type="time" id="entryTime">
    <label>Exit Date</label>
    <small>Date when visitor left</small>
    <input type="date" id="exitDate">
    <label>Exit Time</label>
    <small>Time when visitor left</small>
    <input type="time" id="exitTime">
    <button onclick="addCustomer()">Add Customer</button>
    <hr>
    <h2>Search</h2>
    <input type="text" id="searchId" placeholder="Search by National ID">
    <button onclick="searchById()">Search ID</button>
    <input type="text" id="searchSector" placeholder="Search by Sector">
    <button onclick="searchBySector()">Search Sector</button>
    <button onclick="showAll()">Show All</button>
    <button onclick="clearAllData()">Clear Data</button>
    <table id="report">
        <thead>
        <tr>
            <th>Name</th>
            <th>National ID</th>
            <th>Sector</th>
            <th>Entry Date</th>
            <th>Entry Time</th>
            <th>Exit Date</th>
            <th>Exit Time</th>
        </tr>
        </thead>
        <tbody>
        </tbody>    

    </table>

</div>

<script>

let customers =JSON.parse(localStorage.getItem("customers")) || [];
window.onload = function(){
    displayCustomers();
};

function displayCustomers(){
    let tbody =document.querySelector("#report tbody");
    tbody.innerHTML = "";
    customers.forEach(customer => {
        let row = tbody.insertRow();
        row.insertCell(0).textContent = customer.name;
        row.insertCell(1).textContent = customer.nationalId;
        row.insertCell(2).textContent = customer.sector;
        row.insertCell(3).textContent = customer.entryDate;
        row.insertCell(4).textContent = customer.entryTime;
        row.insertCell(5).textContent = customer.exitDate;
        row.insertCell(6).textContent = customer.exitTime;
    });
}

function addCustomer(){
    let name =document.getElementById("name").value.trim();
    let nationalId =document.getElementById("nationalId").value.trim();
    let sector =document.getElementById("sector").value.trim();
    let entryDate =document.getElementById("entryDate").value;
    let entryTime =document.getElementById("entryTime").value;
    let exitDate =document.getElementById("exitDate").value;
    let exitTime =document.getElementById("exitTime").value;
    if(name === "" || nationalId === ""){
        alert("Please enter Name and National ID");
        return;
    }
    let customer = {
        name,
        nationalId,
        sector,
        entryDate,
        entryTime,
        exitDate,
        exitTime
    };
    customers.push(customer);
    localStorage.setItem("customers",JSON.stringify(customers));
    displayCustomers();
    document.getElementById("name").value = "";
    document.getElementById("nationalId").value = "";
    document.getElementById("sector").value = "";
    document.getElementById("entryDate").value = "";
    document.getElementById("entryTime").value = "";
    document.getElementById("exitDate").value = "";
    document.getElementById("exitTime").value = "";
}

function searchById(){
    let value = document.getElementById("searchId").value.toLowerCase().trim();
    let rows = document.querySelector("#report tbody").rows;
    for(let i=0;i<rows.length;i++){
        let nationalId =rows[i].cells[1].textContent.toLowerCase();
        rows[i].style.display =nationalId.includes(value)? "": "none";
    }
}

function searchBySector(){
    let value =document.getElementById("searchSector").value.toLowerCase().trim();
    let rows =document.querySelector("#report tbody").rows;
    for(let i=0;i<rows.length;i++){
        let sector =rows[i].cells[2].textContent.toLowerCase();
        rows[i].style.display =sector.includes(value)? "": "none";
    }
}

function showAll(){

    let rows = document.querySelector("#report tbody").rows;
    for(let i=0;i<rows.length;i++){
        rows[i].style.display = "";
    }
}
function clearAllData(){
    if(confirm("Delete all data?")){
        localStorage.removeItem("customers");
        customers = [];
        displayCustomers();
    }
}
</script>
</body>
</html>
