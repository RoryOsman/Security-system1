<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:30px;
}

.h1{
    color:#007bff;
    font-size:40px;
}

.logo{
    width:300px;
    height:300px;
    object-fit:contain;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:18px;
    font-weight:bold;
    color:#333;
    margin-bottom:5px;
}

small{
    color:#777;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#007bff;
    box-shadow:0 0 5px rgba(0,123,255,0.3);
}

.buttons{
    text-align:center;
    margin-top:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    cursor:pointer;
    font-size:15px;
    margin:5px;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:translateY(-2px);
}

h2{
    text-align:center;
    margin:30px 0 20px;
    color:#333;
}

.search-box{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    margin-bottom:15px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:800px;
}

th{
    background:#007bff;
    color:white;
    padding:15px;
}

td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f8f8;
}

@media(max-width:768px){

    .header{
        flex-direction:column;
        text-align:center;
    }

    .h1{
        font-size:30px;
    }

    .logo{
        width:220px;
        height:220px;
    }

    .search-box{
        grid-template-columns:1fr;
    }

    button{
        width:100%;
    }

    table{
        min-width:700px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1 class="h1">Security System</h1>

        <!-- ضع اللوجو الخاص بك هنا -->
        <img src="WhatsApp_Image_2026-06-23_at_11.17.44_AM-removebg-preview.png"
        class="logo">
    </div>

    <div class="form-grid">

        <div class="form-group">
            <label>Customer Name</label>
            <small>Enter visitor full name</small>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>National ID</label>
            <small>Used for identification and searching</small>
            <input type="text" id="nationalId">
        </div>

        <div class="form-group">
            <label>Sector</label>
            <small>Department or sector</small>
            <input type="text" id="sector">
        </div>

        <div class="form-group">
            <label>Entry Date</label>
            <small>Date when visitor entered</small>
            <input type="date" id="entryDate">
        </div>

        <div class="form-group">
            <label>Entry Time</label>
            <small>Time when visitor entered</small>
            <input type="time" id="entryTime">
        </div>

        <div class="form-group">
            <label>Exit Date</label>
            <small>Date when visitor left</small>
            <input type="date" id="exitDate">
        </div>

        <div class="form-group">
            <label>Exit Time</label>
            <small>Time when visitor left</small>
            <input type="time" id="exitTime">
        </div>

    </div>

    <div class="buttons">
        <button onclick="addCustomer()">Add Customer</button>
    </div>

    <hr>

    <h2>Search</h2>

    <div class="search-box">
        <input type="text" id="searchId"
        placeholder="Search by National ID">
        <button onclick="searchById()">Search ID</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchSector"
        placeholder="Search by Sector">
        <button onclick="searchBySector()">Search Sector</button>
    </div>

    <div class="buttons">
        <button onclick="showAll()">Show All</button>
        <button onclick="clearAllData()">Clear Data</button>
    </div>

    <div class="table-container">
        <table id="report">
            <thead>
            <tr>
                <th>Name</th>
                <th>National ID</th>
                <th>Sector</th>
                <th>Entry Date</th>
                <th>Entry Time</th>
                <th>Exit Date</th>
                <th>Exit Time</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
let customers =
JSON.parse(localStorage.getItem("customers")) || [];

window.onload = function(){
    displayCustomers();
};

function displayCustomers(){
    let tbody = document.querySelector("#report tbody");
    tbody.innerHTML = "";

    customers.forEach(customer => {
        let row = tbody.insertRow();

        row.insertCell(0).textContent = customer.name;
        row.insertCell(1).textContent = customer.nationalId;
        row.insertCell(2).textContent = customer.sector;
        row.insertCell(3).textContent = customer.entryDate;
        row.insertCell(4).textContent = customer.entryTime;
        row.insertCell(5).textContent = customer.exitDate;
        row.insertCell(6).textContent = customer.exitTime;
    });
}

function addCustomer(){

    let name =
    document.getElementById("name").value.trim();

    let nationalId =
    document.getElementById("nationalId").value.trim();

    let sector =
    document.getElementById("sector").value.trim();

    let entryDate =
    document.getElementById("entryDate").value;

    let entryTime =
    document.getElementById("entryTime").value;

    let exitDate =
    document.getElementById("exitDate").value;

    let exitTime =
    document.getElementById("exitTime").value;

    if(name === "" || nationalId === ""){
        alert("Please enter Name and National ID");
        return;
    }

    let customer = {
        name,
        nationalId,
        sector,
        entryDate,
        entryTime,
        exitDate,
        exitTime
    };

    customers.push(customer);

    localStorage.setItem(
        "customers",
        JSON.stringify(customers)
    );

    displayCustomers();

    document.getElementById("name").value = "";
    document.getElementById("nationalId").value = "";
    document.getElementById("sector").value = "";
    document.getElementById("entryDate").value = "";
    document.getElementById("entryTime").value = "";
    document.getElementById("exitDate").value = "";
    document.getElementById("exitTime").value = "";
}

function searchById(){
    let value =
    document.getElementById("searchId")
    .value.toLowerCase().trim();

    let rows =
    document.querySelector("#report tbody").rows;

    for(let i=0;i<rows.length;i++){
        let nationalId =
        rows[i].cells[1].textContent.toLowerCase();

        rows[i].style.display =
        nationalId.includes(value) ? "" : "none";
    }
}

function searchBySector(){
    let value =
    document.getElementById("searchSector")
    .value.toLowerCase().trim();

    let rows =
    document.querySelector("#report tbody").rows;

    for(let i=0;i<rows.length;i++){
        let sector =
        rows[i].cells[2].textContent.toLowerCase();

        rows[i].style.display =
        sector.includes(value) ? "" : "none";
    }
}

function showAll(){
    let rows =
    document.querySelector("#report tbody").rows;

    for(let i=0;i<rows.length;i++){
        rows[i].style.display = "";
    }
}

function clearAllData(){
    if(confirm("Delete all data?")){
        localStorage.removeItem("customers");
        customers = [];
        displayCustomers();
    }
}
</script>

</body>
</html>
